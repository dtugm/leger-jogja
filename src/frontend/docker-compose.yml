services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        - NEXT_PUBLIC_TOKEN_ENCRYPTION_KEY=${NEXT_PUBLIC_TOKEN_ENCRYPTION_KEY:-default_secret_key_change_me}
    container_name: leger-jogja-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      - NEXT_PUBLIC_TOKEN_ENCRYPTION_KEY=${NEXT_PUBLIC_TOKEN_ENCRYPTION_KEY:-default_secret_key_change_me}
    restart: always
