steps:
  # Step 1: Build Docker image berdasarkan tag
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [[ "$TAG_NAME" == *"be"* ]]; then
          echo "🔨 Building Backend image..."
          docker build -t $_IMAGE_NAME:$_TAG -f src/backend/Dockerfile src/backend
        elif [[ "$TAG_NAME" == *"fe"* ]]; then
          echo "🔨 Building Frontend image..."
          docker build -t $_IMAGE_NAME:$_TAG -f src/frontend/Dockerfile src/frontend
        else
          echo "❌ Error: Tag must contain 'be' or 'fe'"
          exit 1
        fi

  # Step 2: Push image ke Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    waitFor: ['build-image']
    args:
      - 'push'
      - '$_IMAGE_NAME:$_TAG'

options:
  logging: CLOUD_LOGGING_ONLY
